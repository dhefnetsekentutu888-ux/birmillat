<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BirMillat – Profil</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/style.css">
<style>
    .profile-shell { max-width: 760px; margin: 2rem auto; padding: 0 1.5rem; }
    .profile-card { overflow: hidden; padding: 0; margin-bottom: 1.5rem; }
    .cover-band { height: 120px; background: linear-gradient(120deg, var(--color-primary), #6B4FC9); }
    .profile-main { padding: 0 2rem 2rem; position: relative; }
    .avatar-ring {
        width: 110px; height: 110px; border-radius: 50%;
        background: var(--color-surface); border: 4px solid var(--color-surface);
        margin-top: -55px; display: flex; align-items: center; justify-content: center;
        box-shadow: var(--shadow-card);
    }
    .avatar-circle {
        width: 100%; height: 100%; border-radius: 50%; background: #EFEAF8;
        display: flex; align-items: center; justify-content: center;
        font-family: var(--font-display); font-size: 2.2rem; font-weight: 700;
        color: var(--color-primary);
    }
    .profile-top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
    .profile-name h1 { font-size: 1.5rem; margin-top: 0.8rem; margin-bottom: 0.15rem; }
    .profile-name .username { color: var(--color-text-muted); font-size: 0.95rem; margin-bottom: 1rem; }
    .profile-bio { font-size: 0.98rem; color: var(--color-text); max-width: 540px; margin-bottom: 1.4rem; }
    .profile-bio.empty { color: var(--color-text-muted); font-style: italic; }
    .not-found {
        text-align: center;
        padding: 4rem 1.5rem;
        color: var(--color-text-muted);
    }
    .not-found i { font-size: 2.4rem; color: var(--color-border); margin-bottom: 1rem; display: block; }

    .achievements-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 0.8rem;
    }
    .ach-card {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        background: var(--color-surface);
    }
    .ach-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .ach-card img { width: 100%; height: 90px; object-fit: cover; display: block; }
    .ach-card .ach-title {
        padding: 0.5rem 0.6rem;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--color-text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .ach-empty { color: var(--color-text-muted); font-size: 0.85rem; }

    .ach-modal {
        display: none;
        position: fixed; inset: 0; background: rgba(26,22,37,0.55);
        z-index: 200; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .ach-modal.open { display: flex; }
    .ach-modal-card {
        background: var(--color-surface); border-radius: var(--radius-md);
        max-width: 420px; width: 100%; overflow: hidden; max-height: 90vh; overflow-y: auto;
    }
    .ach-modal-card img { width: 100%; max-height: 260px; object-fit: cover; display: block; }
    .ach-modal-body { padding: 1.4rem; }
    .ach-modal-body h3 { font-size: 1.1rem; margin-bottom: 0.4rem; }
    .ach-modal-body .ach-date { font-size: 0.78rem; color: var(--color-text-muted); margin-bottom: 0.6rem; }
    .ach-modal-body p { font-size: 0.92rem; color: var(--color-text); line-height: 1.5; }
    .ach-modal-close {
        background: transparent; border: 1.5px solid var(--color-border); color: var(--color-text-muted);
        padding: 0.5rem 1rem; border-radius: var(--radius-pill); cursor: pointer; margin-top: 1rem; font-size: 0.85rem;
    }
</style>
</head>
<body>
    <nav class="navbar">
        <a href="/home" class="logo"><img src="/logo-full.svg" alt="BirMillat" style="height:34px; display:block;"></a>
        <div class="nav-links">
            <a href="/home">Bosh sahifa</a>
            <a href="/recommend">Tavsiyalar</a>
            <a href="/events">Tadbirlar</a>
            <a href="/search">Qidiruv</a>
            <a href="/messages">Xabarlar</a>
            <a href="/profile">Profil</a>
            <a href="/logout">Chiqish</a>
        </div>
        <div class="user-badge" id="userBadge">👤 ...</div>
    </nav>

    <div class="profile-shell" id="profileRoot">
        <div class="profile-card card">
            <div class="cover-band"></div>
            <div class="profile-main">
                <div class="profile-top-row">
                    <div class="avatar-ring">
                        <img id="avatarPhoto" class="avatar-circle" style="display:none; object-fit:cover;" alt="">
                        <div class="avatar-circle" id="avatarInitial">?</div>
                    </div>
                    <div style="display:flex; gap:0.6rem; align-items:center;">
                        <button class="btn btn-cancel" id="reportBtn" style="border:1.5px solid var(--color-border); background:transparent; color:var(--color-text-muted);">
                            <i class="fas fa-flag"></i> Shikoyat
                        </button>
                        <a href="#" class="btn btn-primary" id="messageBtn">
                            <i class="fas fa-paper-plane"></i> Xabar yuborish
                        </a>
                    </div>
                </div>

                <div class="profile-name">
                    <h1 id="viewName">Yuklanmoqda...</h1>
                    <div class="username" id="viewUsername"></div>
                </div>
                <p class="profile-bio" id="viewBio"></p>
                <div id="viewMeta" style="display:flex; gap:1rem; color:var(--color-text-muted); font-size:0.88rem; margin-bottom:1rem;"></div>

                <div class="profile-interests">
                    <div class="section-label">Qiziqishlar</div>
                    <div class="tag-list" id="viewInterests"></div>
                </div>

                <div class="profile-achievements" style="margin-top:1.6rem;">
                    <div class="section-label">Yutuqlari</div>
                    <div class="achievements-grid" id="achievementsGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="ach-modal" id="achModal">
        <div class="ach-modal-card">
            <img id="achModalImage" src="" alt="">
            <div class="ach-modal-body">
                <h3 id="achModalTitle"></h3>
                <div class="ach-date" id="achModalDate"></div>
                <p id="achModalDesc"></p>
                <button class="ach-modal-close" id="achModalClose">Yopish</button>
            </div>
        </div>
    </div>

    <footer>BirMillat – qiziqishlar asosida do'stlar toping.<br><span style="opacity:0.8;">Founder — Bekhruz Ravshanov</span></footer>

    <div id="reportModal" style="display:none; position:fixed; inset:0; background:rgba(26,22,37,0.5); z-index:100; align-items:center; justify-content:center; padding:1.5rem;">
        <div class="card" style="max-width:420px; width:100%; max-height:90vh; overflow-y:auto;">
            <h2 style="font-size:1.2rem; margin-bottom:1rem;"><i class="fas fa-flag"></i> Shikoyat qilish</h2>
            <form id="reportForm">
                <div style="margin-bottom:1rem;">
                    <label style="display:block; font-size:0.82rem; font-weight:600; color:var(--color-text-muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.4px;">Sabab</label>
                    <select id="reportReason" required style="width:100%; padding:0.7rem 0.9rem; border-radius:var(--radius-sm); border:1px solid var(--color-border); font-family:var(--font-body); font-size:0.95rem;">
                        <option value="">Tanlang...</option>
                        <option value="Spam">Spam</option>
                        <option value="Haqorat / tahdid">Haqorat / tahdid</option>
                        <option value="Nomaqul kontent">Nomaqul kontent</option>
                        <option value="Soxta profil">Soxta profil</option>
                        <option value="Boshqa">Boshqa</option>
                    </select>
                </div>
                <div style="margin-bottom:1rem;">
                    <label style="display:block; font-size:0.82rem; font-weight:600; color:var(--color-text-muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.4px;">Tafsilotlar (ixtiyoriy)</label>
                    <textarea id="reportDetails" rows="3" placeholder="Nima bo'lganini qisqacha tushuntiring" style="width:100%; padding:0.7rem 0.9rem; border-radius:var(--radius-sm); border:1px solid var(--color-border); font-family:var(--font-body); font-size:0.95rem; resize:vertical;"></textarea>
                </div>
                <div style="margin-bottom:1.2rem;">
                    <label style="display:block; font-size:0.82rem; font-weight:600; color:var(--color-text-muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.4px;">Skrinshot (ixtiyoriy)</label>
                    <input type="file" id="reportScreenshot" accept="image/*" style="width:100%; font-size:0.88rem;">
                </div>
                <div style="display:flex; gap:0.8rem;">
                    <button type="submit" class="btn btn-primary" style="flex:1; justify-content:center;">Yuborish</button>
                    <button type="button" class="btn btn-cancel" id="closeReportModal" style="border:1.5px solid var(--color-border); background:transparent; color:var(--color-text-muted);">Bekor qilish</button>
                </div>
                <div class="save-status" id="reportStatus" style="font-size:0.85rem; margin-top:0.6rem; min-height:1.2em;"></div>
            </form>
        </div>
    </div>

    <script>
        const reportedUsername = decodeURIComponent(window.location.pathname.split('/').filter(Boolean).pop() || '');

        document.getElementById('reportBtn').addEventListener('click', () => {
            document.getElementById('reportModal').style.display = 'flex';
        });
        document.getElementById('closeReportModal').addEventListener('click', () => {
            document.getElementById('reportModal').style.display = 'none';
        });

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('reportStatus');
            const reason = document.getElementById('reportReason').value;
            const details = document.getElementById('reportDetails').value.trim();
            const fileInput = document.getElementById('reportScreenshot');

            if (!reason) return;

            statusEl.textContent = 'Yuborilmoqda...';
            statusEl.style.color = 'var(--color-text-muted)';

            try {
                const formData = new FormData();
                formData.append('reportedUsername', reportedUsername);
                formData.append('reason', reason);
                formData.append('details', details);
                if (fileInput.files[0]) {
                    formData.append('screenshot', fileInput.files[0]);
                }

                const res = await fetch('/api/report', { method: 'POST', body: formData });
                if (!res.ok) throw new Error('Server error');

                statusEl.textContent = 'Shikoyat yuborildi. Rahmat!';
                statusEl.style.color = 'var(--color-success)';
                setTimeout(() => {
                    document.getElementById('reportModal').style.display = 'none';
                    document.getElementById('reportForm').reset();
                    statusEl.textContent = '';
                }, 1500);
            } catch (err) {
                console.error('Report submit failed:', err);
                statusEl.textContent = "Xatolik yuz berdi. Qaytadan urinib ko'ring.";
                statusEl.style.color = 'var(--color-error)';
            }
        });
    </script>

    <script>
        function initials(name) {
            if (!name) return '?';
            const parts = name.trim().split(/\s+/);
            return parts.length > 1 ? (parts[0][0] + parts[1][0]).toUpperCase() : parts[0].slice(0, 2).toUpperCase();
        }

        function getUsernameFromPath() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            return decodeURIComponent(parts[parts.length - 1] || '');
        }

        async function loadMe() {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) { window.location.href = '/login'; return null; }
                const me = await res.json();
                document.getElementById('userBadge').textContent = '👤 ' + me.username;
                return me;
            } catch (e) {
                console.error('Failed to load own profile:', e);
                return null;
            }
        }

        async function loadProfile() {
            const username = getUsernameFromPath();
            const me = await loadMe();

            // Visiting your own public profile link — send to the editable version instead
            if (me && me.username === username) {
                window.location.href = '/profile';
                return;
            }

            try {
                const res = await fetch(`/api/users/${encodeURIComponent(username)}`);
                if (!res.ok) {
                    document.getElementById('profileRoot').innerHTML = `
                        <div class="not-found">
                            <i class="fas fa-user-slash"></i>
                            <p>Bu foydalanuvchi topilmadi.</p>
                        </div>`;
                    return;
                }
                const user = await res.json();

                if (user.photoUrl) {
                    document.getElementById('avatarPhoto').src = user.photoUrl;
                    document.getElementById('avatarPhoto').style.display = 'block';
                    document.getElementById('avatarInitial').style.display = 'none';
                } else {
                    document.getElementById('avatarInitial').textContent = initials(user.name || user.username);
                }
                document.getElementById('viewName').textContent = user.name || user.username;
                document.getElementById('viewUsername').textContent = '@' + user.username;

                const bioEl = document.getElementById('viewBio');
                if (user.bio && user.bio.trim()) {
                    bioEl.textContent = user.bio;
                    bioEl.classList.remove('empty');
                } else {
                    bioEl.textContent = "Bio qo'shilmagan.";
                    bioEl.classList.add('empty');
                }

                const metaParts = [];
                if (user.age) metaParts.push(`<span><i class="fas fa-cake-candles"></i> ${user.age} yosh</span>`);
                if (user.region) metaParts.push(`<span><i class="fas fa-location-dot"></i> ${user.region}</span>`);
                document.getElementById('viewMeta').innerHTML = metaParts.join('');

                const interestsEl = document.getElementById('viewInterests');
                const interests = user.interests || [];
                interestsEl.innerHTML = interests.length
                    ? interests.map(t => `<span class="tag">#${t}</span>`).join('')
                    : `<span class="tag" style="opacity:0.7">Qiziqish ko'rsatilmagan</span>`;

                document.getElementById('messageBtn').href = `/messages?with=${encodeURIComponent(user.username)}`;
                loadAchievements(user.username);
            } catch (e) {
                console.error('Failed to load profile:', e);
            }
        }

        function openAchievementModal(ach) {
            document.getElementById('achModalImage').src = ach.imageUrl;
            document.getElementById('achModalTitle').textContent = ach.title;
            document.getElementById('achModalDate').textContent = ach.achievedDate
                ? new Date(ach.achievedDate).toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long', year: 'numeric' })
                : '';
            document.getElementById('achModalDesc').textContent = ach.description || '';
            document.getElementById('achModal').classList.add('open');
        }

        document.getElementById('achModalClose').addEventListener('click', () => {
            document.getElementById('achModal').classList.remove('open');
        });
        document.getElementById('achModal').addEventListener('click', (e) => {
            if (e.target.id === 'achModal') document.getElementById('achModal').classList.remove('open');
        });

        async function loadAchievements(username) {
            const grid = document.getElementById('achievementsGrid');
            try {
                const res = await fetch(`/api/users/${encodeURIComponent(username)}/achievements`);
                if (!res.ok) return;
                const achievements = await res.json();

                if (achievements.length === 0) {
                    grid.innerHTML = `<span class="ach-empty">Hali yutuqlar qo'shilmagan</span>`;
                    return;
                }

                grid.innerHTML = '';
                achievements.forEach(ach => {
                    const card = document.createElement('div');
                    card.className = 'ach-card';
                    card.innerHTML = `<img src="${ach.imageUrl}" alt=""><div class="ach-title">${ach.title}</div>`;
                    card.addEventListener('click', () => openAchievementModal(ach));
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error('Failed to load achievements:', e);
            }
        }

        loadProfile();
    </script>
</body>
</html>
