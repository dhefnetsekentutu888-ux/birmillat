<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BirMillat – Jamoa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/style.css">
<script src="/socket.io/socket.io.js"></script>
<style>
    .chat-shell { max-width: 1100px; margin: 1.5rem auto; padding: 0 1.5rem; height: calc(100vh - 110px); }
    .chat-grid {
        display: grid; grid-template-columns: 1fr 260px; height: 100%;
        background: var(--color-surface); border-radius: var(--radius-md);
        border: 1px solid var(--color-border); overflow: hidden; box-shadow: var(--shadow-card);
    }
    .chat-panel { display: flex; flex-direction: column; height: 100%; }
    .chat-head { padding: 1rem 1.4rem; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: 0.8rem; }
    .chat-head h2 { font-size: 1.05rem; }
    .chat-head .sub { font-size: 0.8rem; color: var(--color-text-muted); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1.4rem; display: flex; flex-direction: column; gap: 0.5rem; }

    .msg-row { display: flex; gap: 0.6rem; align-items: flex-end; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-avatar {
        width: 28px; height: 28px; border-radius: 50%; background: #EFEAF8;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        font-size: 0.7rem; font-weight: 700; color: var(--color-primary); overflow: hidden;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-bubble-wrap { max-width: 65%; }
    .msg-sender-name { font-size: 0.72rem; font-weight: 600; color: var(--color-primary); margin-bottom: 0.2rem; }
    .msg-bubble { padding: 0.6rem 0.95rem; border-radius: 1rem; font-size: 0.92rem; line-height: 1.4; word-wrap: break-word; }
    .msg-bubble.theirs { background: var(--color-bg); color: var(--color-text); border-bottom-left-radius: 0.3rem; }
    .msg-bubble.mine { background: var(--color-primary); color: white; border-bottom-right-radius: 0.3rem; }
    .msg-time { font-size: 0.68rem; opacity: 0.65; margin-top: 0.25rem; display: block; }

    .chat-input-row { border-top: 1px solid var(--color-border); padding: 0.9rem 1.2rem; display: flex; gap: 0.7rem; }
    .chat-input-row input {
        flex: 1; padding: 0.7rem 1rem; border-radius: var(--radius-pill);
        border: 1px solid var(--color-border); font-family: var(--font-body); font-size: 0.92rem;
    }
    .chat-input-row button {
        background: var(--color-accent); color: white; border: none; width: 42px; height: 42px;
        border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .members-panel { border-left: 1px solid var(--color-border); overflow-y: auto; padding: 1rem; }
    .members-panel h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.4px; color: var(--color-text-muted); margin-bottom: 0.8rem; }
    .member-row {
        display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.4rem; border-radius: var(--radius-sm);
    }
    .member-row:hover { background: var(--color-bg); }
    .member-avatar {
        width: 30px; height: 30px; border-radius: 50%; background: #EFEAF8;
        display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700;
        color: var(--color-primary); flex-shrink: 0; overflow: hidden;
    }
    .member-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .member-name { font-size: 0.85rem; flex: 1; }
    .member-name a { color: var(--color-text); text-decoration: none; }
    .member-kick { background: none; border: none; color: var(--color-text-muted); cursor: pointer; font-size: 0.75rem; }
    .member-kick:hover { color: var(--color-error); }
    .leave-btn { width: 100%; margin-top: 1rem; }

    .member-action {
        background: none; border: none; color: var(--color-text-muted); cursor: pointer;
        font-size: 0.78rem; padding: 0.3rem; margin-left: 0.2rem;
    }
    .member-action:hover { color: var(--color-primary); }
    .member-action.member-kick:hover { color: var(--color-error); }

    .role-badge {
        font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.5rem; border-radius: var(--radius-pill);
        margin-left: 0.4rem; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .role-badge.creator { background: #FFEAE6; color: var(--color-accent); }
    .role-badge.admin { background: #EFEAF8; color: var(--color-primary); }

    .member-count-btn:hover { color: var(--color-primary) !important; }

    .members-modal {
        display: none; position: fixed; inset: 0; background: rgba(26,16,64,0.5);
        z-index: 200; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .members-modal.open { display: flex; }
    .members-modal-card { max-width: 400px; width: 100%; max-height: 70vh; display: flex; flex-direction: column; padding: 0; overflow: hidden; }
    .members-modal-head {
        display: flex; justify-content: space-between; align-items: center;
        padding: 1.1rem 1.3rem; border-bottom: 1px solid var(--color-border);
    }
    .members-modal-head h3 { font-size: 1rem; }
    .members-modal-head button { background: none; border: none; color: var(--color-text-muted); cursor: pointer; font-size: 1rem; }
    .members-modal-list { padding: 0.6rem; overflow-y: auto; flex: 1; }

    .reply-preview-row {
        padding: 0.6rem 1.2rem; border-top: 1px solid var(--color-border); background: var(--color-bg);
        display: flex; justify-content: space-between; align-items: center; gap: 0.6rem; font-size: 0.82rem;
    }
    .reply-preview-row .reply-preview-text { color: var(--color-text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reply-preview-row .reply-preview-text strong { color: var(--color-primary); }
    .reply-preview-row button { background: none; border: none; color: var(--color-text-muted); cursor: pointer; flex-shrink: 0; }

    .msg-reply-quote {
        font-size: 0.78rem; opacity: 0.85; border-left: 2px solid currentColor;
        padding-left: 0.5rem; margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    }
    .msg-reply-btn {
        background: none; border: none; color: var(--color-text-muted); cursor: pointer;
        font-size: 0.72rem; opacity: 0; transition: opacity 0.15s ease; padding: 0.2rem 0.4rem; align-self: center;
    }
    .msg-row:hover .msg-reply-btn { opacity: 1; }

    .connection-banner { font-size: 0.78rem; text-align: center; padding: 0.4rem; background: var(--color-error-bg); color: var(--color-error); display: none; }

    @media (max-width: 760px) {
        .chat-grid { grid-template-columns: 1fr; }
        .members-panel { display: none; }
        .msg-reply-btn { opacity: 1; }
    }
</style>
</head>
<body>
    <nav class="navbar">
        <a href="/home" class="logo">
            <svg width="160" height="45" viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg" style="display:block;">
              <g transform="translate(45,45)">
                <g transform="rotate(-18)"><ellipse cx="-10" cy="0" rx="20" ry="36" fill="none" stroke="#2D1B69" stroke-width="10"/></g>
                <g transform="rotate(18)"><ellipse cx="10" cy="0" rx="20" ry="36" fill="none" stroke="#FF6B5B" stroke-width="10"/></g>
                <g transform="rotate(-18)"><path d="M -30 0 A 20 36 0 0 1 11 0" fill="none" stroke="#2D1B69" stroke-width="10" stroke-linecap="round"/></g>
              </g>
              <text x="95" y="53" font-size="34" font-weight="700" fill="#2D1B69" font-family="Poppins, -apple-system, sans-serif">Bir<tspan fill="#FF6B5B">Millat</tspan></text>
            </svg>
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Menyu"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="/home">Bosh sahifa</a>
            <a href="/communities">Jamoalar</a>
            <a href="/messages">Xabarlar</a>
            <a href="/profile">Profil</a>
            <a href="/logout">Chiqish</a>
        </div>
        <div class="user-badge" id="userBadge"><img src="/icons/icon-user.svg" alt="" style="width:12px; height:12px; vertical-align:-1px;"> ...</div>
    </nav>

    <div class="connection-banner" id="connectionBanner">Ulanish yo'q — qayta ulanmoqda...</div>

    <div class="chat-shell">
        <div class="chat-grid" id="chatGrid">
            <p style="padding:2rem; color:var(--color-text-muted);">Yuklanmoqda...</p>
        </div>
    </div>

    <div class="members-modal" id="membersModal">
        <div class="members-modal-card card">
            <div class="members-modal-head">
                <h3 id="membersModalTitle">A'zolar</h3>
                <button id="closeMembersModal" aria-label="Yopish"><i class="fas fa-xmark"></i></button>
            </div>
            <div id="membersModalList" class="members-modal-list"></div>
        </div>
    </div>

    <script>
        let myUserId = null;
        let myUsername = null;
        let communityId = null;
        let socket = null;
        let isCreator = false;

        function getCommunityId() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            return parts[parts.length - 1];
        }

        function initials(name) {
            if (!name) return '?';
            const parts = name.trim().split(/\s+/);
            return parts.length > 1 ? (parts[0][0] + parts[1][0]).toUpperCase() : parts[0].slice(0, 2).toUpperCase();
        }

        function avatarHtml(photoUrl, name) {
            return photoUrl
                ? `<img src="${photoUrl}" alt="">`
                : initials(name);
        }

        function formatTime(ts) {
            return new Date(ts).toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadMe() {
            const res = await fetch('/api/me');
            if (!res.ok) {
                document.getElementById('userBadge').style.display = 'none';
                return null;
            }
            const me = await res.json();
            myUsername = me.username;
            document.getElementById('userBadge').innerHTML = '<img src="/icons/icon-user.svg" alt="" style="width:12px; height:12px; vertical-align:-1px;"> ' + me.username;
            return me;
        }

        const messageContentMap = new Map();

        function appendMessage(msg) {
            const messagesEl = document.getElementById('chatMessages');
            if (!messagesEl) return;
            const isMine = msg.senderId === myUserId || msg.isMine;
            const row = document.createElement('div');
            row.className = 'msg-row ' + (isMine ? 'mine' : '');
            row.dataset.messageId = msg.id;
            messageContentMap.set(String(msg.id), {
                senderName: msg.senderName || msg.senderUsername,
                content: msg.content
            });

            const replyQuoteHtml = msg.replyTo
                ? `<div class="msg-reply-quote">${msg.replyTo.senderName || msg.replyTo.senderUsername}: ${escapeHtml(msg.replyTo.content)}</div>`
                : '';

            row.innerHTML = `
                <div class="msg-avatar">${avatarHtml(msg.senderPhoto, msg.senderName || msg.senderUsername)}</div>
                <button class="msg-reply-btn" data-msgid="${msg.id}" title="Javob berish"><i class="fas fa-reply"></i></button>
                <div class="msg-bubble-wrap">
                    ${!isMine ? `<div class="msg-sender-name">${msg.senderName || msg.senderUsername}</div>` : ''}
                    <div class="msg-bubble ${isMine ? 'mine' : 'theirs'}">${replyQuoteHtml}${escapeHtml(msg.content)}<span class="msg-time">${formatTime(msg.createdAt)}</span></div>
                </div>
            `;
            messagesEl.appendChild(row);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.msg-reply-btn');
            if (!btn) return;
            const msgId = btn.getAttribute('data-msgid');
            const stored = messageContentMap.get(String(msgId));
            if (!stored) return;

            replyingTo = { id: msgId, senderName: stored.senderName, content: stored.content };
            const previewRow = document.getElementById('replyPreviewRow');
            if (previewRow) {
                previewRow.style.display = 'flex';
                const textEl = document.createElement('div');
                textEl.className = 'reply-preview-text';
                const strongEl = document.createElement('strong');
                strongEl.textContent = replyingTo.senderName;
                textEl.appendChild(strongEl);
                textEl.appendChild(document.createTextNode("ga javob: " + replyingTo.content));

                previewRow.innerHTML = '';
                previewRow.appendChild(textEl);
                const cancelBtn = document.createElement('button');
                cancelBtn.id = 'cancelReplyBtn';
                cancelBtn.innerHTML = '<i class="fas fa-xmark"></i>';
                previewRow.appendChild(cancelBtn);

                cancelBtn.addEventListener('click', () => {
                    replyingTo = null;
                    previewRow.style.display = 'none';
                });
                document.getElementById('messageInput')?.focus();
            }
        });

        let replyingTo = null;

        function renderChat(community) {
            const grid = document.getElementById('chatGrid');
            const avatarClickable = community.isCreator;
            const canManage = community.canManage;
            grid.innerHTML = `
                <div class="chat-panel">
                    <div class="chat-head">
                        <div id="commAvatarWrap" style="width:38px; height:38px; border-radius:50%; background:#EFEAF8; display:flex; align-items:center; justify-content:center; color:var(--color-primary); font-size:0.95rem; flex-shrink:0; overflow:hidden; position:relative; ${avatarClickable ? 'cursor:pointer;' : ''}">
                            <span id="commAvatarContent">${communityAvatarHtml(community.imageUrl, community.name)}</span>
                            ${avatarClickable ? `<div id="avatarHoverHint" style="position:absolute; inset:0; background:rgba(26,16,64,0.5); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s ease;"><i class="fas fa-camera" style="color:white; font-size:0.8rem;"></i></div>` : ''}
                        </div>
                        ${avatarClickable ? `<input type="file" id="commImageInput" accept="image/*" style="display:none;">` : ''}
                        <div>
                            <h2>${community.name}</h2>
                            <button class="sub member-count-btn" id="memberCountBtn" style="background:none; border:none; padding:0; cursor:pointer; color:var(--color-text-muted); font-size:0.8rem; text-decoration:underline;">${community.memberCount} a'zo · ${community.category}</button>
                        </div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="reply-preview-row" id="replyPreviewRow" style="display:none;"></div>
                    <div class="chat-input-row">
                        <input type="text" id="messageInput" placeholder="Xabar yozing...">
                        <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
                <div class="members-panel">
                    <h3>A'zolar (${community.memberCount})</h3>
                    <div id="membersList"></div>
                    ${!community.isCreator ? `<button class="btn btn-cancel leave-btn" id="leaveBtn" style="border:1.5px solid var(--color-border); background:transparent; color:var(--color-text-muted);">Jamoadan chiqish</button>` : ''}
                </div>
            `;

            renderMembersInto(document.getElementById('membersList'), community, canManage);
            document.getElementById('memberCountBtn').addEventListener('click', () => openMembersModal(community, canManage));

            if (avatarClickable) {
                const wrap = document.getElementById('commAvatarWrap');
                const hint = document.getElementById('avatarHoverHint');
                const fileInput = document.getElementById('commImageInput');

                wrap.addEventListener('mouseenter', () => { hint.style.opacity = '1'; });
                wrap.addEventListener('mouseleave', () => { hint.style.opacity = '0'; });
                wrap.addEventListener('click', () => fileInput.click());

                fileInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    try {
                        const formData = new FormData();
                        formData.append('image', file);
                        const res = await fetch(`/api/communities/${communityId}/image`, { method: 'POST', body: formData });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error || 'Server error');
                        document.getElementById('commAvatarContent').innerHTML = communityAvatarHtml(data.imageUrl, community.name);
                    } catch (err) {
                        console.error('Community photo update failed:', err);
                        alert(err.message || "Rasmni yangilashda xatolik yuz berdi");
                    }
                });
            }

            document.getElementById('sendBtn').addEventListener('click', sendCurrentMessage);
            document.getElementById('messageInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendCurrentMessage();
            });

            const leaveBtn = document.getElementById('leaveBtn');
            if (leaveBtn) {
                leaveBtn.addEventListener('click', async () => {
                    if (!confirm("Jamoadan chiqishni xohlaysizmi?")) return;
                    const res = await fetch(`/api/communities/${communityId}/leave`, { method: 'POST' });
                    if (res.ok) window.location.href = '/communities';
                });
            }
        }

        function renderMembersInto(container, community, canManage) {
            container.innerHTML = '';
            community.members.forEach(m => {
                const isCreatorMember = m.id === community.creator_id;
                const isAdminMember = m.role === 'admin';
                const row = document.createElement('div');
                row.className = 'member-row';
                row.innerHTML = `
                    <div class="member-avatar">${avatarHtml(m.photo_url, m.name || m.username)}</div>
                    <div class="member-name">
                        <a href="/u/${m.username}">${m.name || m.username}</a>
                        ${isCreatorMember ? `<span class="role-badge creator">Egasi</span>` : (isAdminMember ? `<span class="role-badge admin">Admin</span>` : '')}
                    </div>
                    ${community.isCreator && !isCreatorMember ? `
                        <button class="member-action" data-action="${isAdminMember ? 'demote' : 'promote'}" data-userid="${m.id}" title="${isAdminMember ? 'Admindan olish' : 'Admin qilish'}">
                            <i class="fas ${isAdminMember ? 'fa-user-minus' : 'fa-user-shield'}"></i>
                        </button>
                    ` : ''}
                    ${canManage && !isCreatorMember && m.id !== myUserId ? `<button class="member-action member-kick" data-action="kick" data-userid="${m.id}" title="Chiqarish"><i class="fas fa-user-xmark"></i></button>` : ''}
                `;
                container.appendChild(row);
            });

            container.addEventListener('click', async (e) => {
                const btn = e.target.closest('.member-action');
                if (!btn) return;
                const action = btn.getAttribute('data-action');
                const userId = btn.getAttribute('data-userid');

                if (action === 'kick') {
                    if (!confirm("Bu a'zoni chiqarmoqchimisiz?")) return;
                    const res = await fetch(`/api/communities/${communityId}/remove/${userId}`, { method: 'POST' });
                    if (res.ok) loadCommunity();
                } else if (action === 'promote' || action === 'demote') {
                    const res = await fetch(`/api/communities/${communityId}/admins/${userId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action })
                    });
                    if (res.ok) loadCommunity();
                    else {
                        const data = await res.json().catch(() => ({}));
                        alert(data.error || "Xatolik yuz berdi");
                    }
                }
            });
        }

        function openMembersModal(community, canManage) {
            const modal = document.getElementById('membersModal');
            const listEl = document.getElementById('membersModalList');
            document.getElementById('membersModalTitle').textContent = `A'zolar (${community.memberCount})`;
            renderMembersInto(listEl, community, canManage);
            modal.classList.add('open');
        }

        document.getElementById('closeMembersModal').addEventListener('click', () => {
            document.getElementById('membersModal').classList.remove('open');
        });
        document.getElementById('membersModal').addEventListener('click', (e) => {
            if (e.target.id === 'membersModal') document.getElementById('membersModal').classList.remove('open');
        });

        function sendCurrentMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !socket) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            const replyToId = replyingTo ? replyingTo.id : null;

            let callbackFired = false;
            const reEnableTimeout = setTimeout(() => {
                if (!callbackFired) {
                    sendBtn.disabled = false;
                    console.warn('send_community_message timed out waiting for server response');
                }
            }, 6000);

            socket.emit('send_community_message', { communityId, content, replyToId }, (response) => {
                callbackFired = true;
                clearTimeout(reEnableTimeout);
                sendBtn.disabled = false;
                if (!response || !response.success) {
                    alert((response && response.error) || "Xabar yuborilmadi.");
                }
            });

            replyingTo = null;
            const previewRow = document.getElementById('replyPreviewRow');
            if (previewRow) previewRow.style.display = 'none';

            input.value = '';
            input.focus();
        }

        function communityAvatarHtml(imageUrl, name) {
            return imageUrl
                ? `<img src="${imageUrl}" alt="" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`
                : `<i class="fas fa-people-group"></i>`;
        }

        async function loadCommunity() {
            try {
                const res = await fetch(`/api/communities/${communityId}`);
                if (!res.ok) {
                    document.getElementById('chatGrid').innerHTML = `<p style="padding:2rem; color:var(--color-text-muted);">Jamoa topilmadi.</p>`;
                    return;
                }
                const community = await res.json();
                isCreator = community.isCreator;

                const previewHeader = `
                    <div style="width:72px; height:72px; border-radius:50%; background:#EFEAF8; display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:var(--color-primary); margin:0 auto 1rem;">
                        ${communityAvatarHtml(community.imageUrl, community.name)}
                    </div>
                    <h2 style="margin-bottom:0.4rem;">${community.name}</h2>
                    <p style="color:var(--color-text-muted); font-size:0.85rem; margin-bottom:0.8rem;">
                        <i class="fas fa-tag"></i> ${community.category} · <i class="fas fa-users"></i> ${community.memberCount} a'zo
                    </p>
                    <p style="color:var(--color-text-muted); margin-bottom:1.4rem;">${community.description || ''}</p>
                `;

                // Logged-out visitor: show preview with a login prompt instead of a join button
                if (community.isPreview) {
                    document.getElementById('chatGrid').innerHTML = `
                        <div style="padding:3rem; text-align:center; grid-column:1/-1;">
                            ${previewHeader}
                            <a href="/login?next=/communities/${communityId}" class="btn btn-primary"><i class="fas fa-right-to-bracket"></i> Qo'shilish uchun kiring</a>
                        </div>
                    `;
                    return;
                }

                if (!community.isMember) {
                    document.getElementById('chatGrid').innerHTML = `
                        <div style="padding:3rem; text-align:center; grid-column:1/-1;">
                            ${previewHeader}
                            <button class="btn btn-primary" id="joinBtn"><i class="fas fa-user-plus"></i> Qo'shilish</button>
                        </div>
                    `;
                    document.getElementById('joinBtn').addEventListener('click', async () => {
                        const res = await fetch(`/api/communities/${communityId}/join`, { method: 'POST' });
                        if (res.ok) { loadCommunity(); }
                    });
                    return;
                }

                renderChat(community);

                const msgRes = await fetch(`/api/communities/${communityId}/messages`);
                if (msgRes.ok) {
                    const messages = await msgRes.json();
                    messages.forEach(m => appendMessage(m));
                }

                if (socket) socket.emit('join_community', { communityId });
            } catch (e) {
                console.error('Failed to load community:', e);
            }
        }

        function setupSocket() {
            socket = io();
            const banner = document.getElementById('connectionBanner');
            socket.on('connect', () => { banner.style.display = 'none'; socket.emit('join_community', { communityId }); });
            socket.on('disconnect', () => { banner.style.display = 'block'; });
            socket.on('connect_error', () => { banner.style.display = 'block'; });
            socket.on('new_community_message', (msg) => {
                if (Number(msg.communityId) === Number(communityId)) {
                    appendMessage(msg);
                }
            });
        }

        (async () => {
            communityId = getCommunityId();
            const me = await loadMe();
            if (me) myUserId = me.id;
            if (me) setupSocket();
            await loadCommunity();
        })();
    </script>

    <script>
        const navToggleBtn = document.getElementById('navToggle');
        const navLinksEl = document.getElementById('navLinks');
        if (navToggleBtn && navLinksEl) {
            navToggleBtn.addEventListener('click', () => {
                navLinksEl.classList.toggle('open');
            });
        }
    </script>
</body>
</html>
