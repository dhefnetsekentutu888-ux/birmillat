<!DOCTYPE html>
<html>
<head>
    <title>BirMillat – Global suhbat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f4f6f9;display:flex;height:100vh}
        .sidebar{
            width:260px;
            background:white;
            border-right:1px solid #e0e0e0;
            display:flex;
            flex-direction:column;
            position:fixed;
            height:100vh;
            resize:horizontal;
            overflow:auto;
            min-width:180px;
            max-width:400px;
        }
        .sidebar-header{padding:20px;font-size:20px;font-weight:bold;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:10px;color:#c0392b}
        .sidebar-header img{height:32px}
        .sidebar-menu{flex:1;padding:15px 0}
        .menu-item{display:flex;align-items:center;gap:15px;padding:12px 20px;color:#333;text-decoration:none}
        .menu-item:hover{background:#f0f2f5}
        .menu-item.active{background:#fce4e1;color:#c0392b;border-left:4px solid #c0392b}
        .future-space{margin-top:30px;padding:15px 20px;border-top:1px solid #e0e0e0;color:#888;font-size:12px}
        .main-chat{margin-left:260px;flex:1;display:flex;flex-direction:column;height:100vh}
        .chat-header{background:white;padding:15px 20px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}
        .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px}
        .message{max-width:70%;padding:8px 12px;border-radius:18px;word-wrap:break-word}
        .message.own{background:#dcf8c5;align-self:flex-end;border-bottom-right-radius:4px}
        .message.other{background:#e4e6eb;align-self:flex-start;border-bottom-left-radius:4px}
        .message .sender{font-size:0.7rem;font-weight:bold;margin-bottom:4px}
        .message.system{background:#e9ecef;color:#6c757d;align-self:center;font-style:italic}
        .input-area{padding:15px;background:white;border-top:1px solid #ddd;display:flex;gap:10px}
        .input-area input{flex:1;padding:10px;border-radius:25px;border:1px solid #ddd}
        .input-area button{background:#c0392b;color:white;border:none;width:45px;border-radius:50%;cursor:pointer}
        .social-panel{width:280px;background:white;border-left:1px solid #e0e0e0;padding:20px;overflow-y:auto}
        .social-section{margin-bottom:20px}
        .social-section h4{margin-bottom:10px;color:#c0392b}
        .user-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
        button.small{background:none;border:none;cursor:pointer;color:#c0392b;margin-left:5px}
        .profile-link{cursor:pointer;color:#2c7da0;text-decoration:underline}
        .edit-profile-btn{background:#c0392b;color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;margin-top:10px;width:100%}
        .modal{
            display:none;
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            background:rgba(0,0,0,0.5);
            align-items:center;
            justify-content:center;
            z-index:1000;
        }
        .modal-content{
            background:white;
            padding:24px;
            border-radius:24px;
            width:90%;
            max-width:500px;
        }
        .modal-content input,.modal-content textarea{
            width:100%;
            padding:10px;
            margin:8px 0;
            border-radius:12px;
            border:1px solid #ccc;
        }
        .btn{
            background:#c0392b;
            color:white;
            border:none;
            padding:8px 16px;
            border-radius:24px;
            cursor:pointer;
        }
        @media (max-width:768px){
            .sidebar{width:70px}
            .sidebar-header span,.menu-item span,.future-space{display:none}
            .main-chat{margin-left:70px}
            .social-panel{width:200px}
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="/home" style="text-decoration: none; color: inherit;">
            <div class="sidebar-header">
                <img src="/logo.png" alt="BirMillat logosu">
                <span>BirMillat</span>
            </div>
        </a>
        <div class="sidebar-menu">
            <a href="/home" class="menu-item"><i class="fas fa-home"></i> <span>Bosh sahifa</span></a>
            <a href="/chat" class="menu-item active"><i class="fas fa-comments"></i> <span>Global suhbat</span></a>
            <div class="future-space"><i class="fas fa-plus-circle"></i> Kelajakda: Guruhlar</div>
        </div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <span><i class="fas fa-globe"></i> Global suhbat</span>
            <a href="/logout" style="color:#c0392b;"><i class="fas fa-sign-out-alt"></i> Chiqish</a>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Xabar yozing..." autocomplete="off">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <div class="social-panel">
        <div class="social-section">
            <h4><i class="fas fa-user-edit"></i> Mening profilim</h4>
            <button id="editProfileBtn" class="edit-profile-btn"><i class="fas fa-pen"></i> Profilni tahrirlash</button>
        </div>
        <div class="social-section">
            <h4><i class="fas fa-user-friends"></i> Do'stlik so'rovlari</h4>
            <div id="requestsList">Yuklanmoqda...</div>
        </div>
        <div class="social-section">
            <h4><i class="fas fa-user-plus"></i> Do'st qo'shish</h4>
            <input type="text" id="friendUsername" placeholder="Foydalanuvchi nomi" style="width:100%;padding:5px;margin-bottom:5px;">
            <button id="sendRequestBtn" style="width:100%;background:#c0392b;color:white;border:none;padding:5px;border-radius:20px;">So'rov yuborish</button>
        </div>
        <div class="social-section">
            <h4><i class="fas fa-ban"></i> Bloklash</h4>
            <input type="text" id="blockUsername" placeholder="Foydalanuvchi nomi" style="width:100%;padding:5px;margin-bottom:5px;">
            <button id="blockBtn" style="width:100%;background:#c0392b;color:white;border:none;padding:5px;border-radius:20px;">Bloklash</button>
        </div>
        <div class="social-section">
            <h4><i class="fas fa-search"></i> Foydalanuvchi qidirish</h4>
            <input type="text" id="searchUser" placeholder="Ism yoki username">
            <button id="searchBtn" style="width:100%;margin-top:5px;">Qidirish</button>
            <div id="searchResult" style="margin-top:8px;"></div>
        </div>
    </div>

    <!-- Profile Edit Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3>Profilni tahrirlash</h3>
            <label>Ism / Familiya</label>
            <input type="text" id="editName" placeholder="To‘liq ismingiz">
            <label>Bio</label>
            <textarea id="editBio" rows="3" placeholder="O‘zingiz haqingizda"></textarea>
            <label>Qiziqishlar (vergul bilan ajrating)</label>
            <input type="text" id="editInterests" placeholder="masalan: Python, AI, O‘yinlar">
            <div style="display: flex; gap: 10px; margin-top: 16px;">
                <button id="saveProfileBtn" class="btn">Saqlash</button>
                <button id="closeModalBtn" class="btn" style="background:#aaa;">Bekor qilish</button>
            </div>
        </div>
    </div>

    <!-- View Profile Modal (when clicking on a user) -->
    <div id="viewProfileModal" class="modal">
        <div class="modal-content">
            <h3 id="viewUsername"></h3>
            <p><strong>Ism:</strong> <span id="viewName"></span></p>
            <p><strong>Bio:</strong> <span id="viewBio"></span></p>
            <p><strong>Qiziqishlar:</strong> <span id="viewInterests"></span></p>
            <button id="closeViewModal" class="btn">Yopish</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ---------- Helper to get current user from session ----------
        async function getCurrentUser() {
            const res = await fetch('/api/me');
            if (res.ok) {
                const data = await res.json();
                return data.username;
            }
            return null;
        }

        let currentUsername = null;
        let socket = null;

        // ---------- Chat functionality with colored bubbles ----------
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(user, text, isOwn, isSystem = false) {
            const msgDiv = document.createElement('div');
            if (isSystem) {
                msgDiv.className = 'message system';
                msgDiv.innerHTML = `<i class="fas fa-info-circle"></i> ${text}`;
            } else {
                msgDiv.className = `message ${isOwn ? 'own' : 'other'}`;
                msgDiv.innerHTML = `<div class="sender">${user}</div><div>${text}</div>`;
            }
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        socket = io();
        socket.on('global message', (msg) => {
            if (msg.user === currentUsername) {
                addMessage(msg.user, msg.text, true);
            } else {
                addMessage(msg.user, msg.text, false);
            }
        });

        function sendMessage() {
            const text = input.value.trim();
            if (text) {
                socket.emit('global message', text);
                input.value = '';
            }
        }
        sendBtn.onclick = sendMessage;
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // ---------- Social functions (friend requests, block) unchanged ----------
        async function loadSocial() {
            const res = await fetch('/api/social');
            const data = await res.json();
            const requestsDiv = document.getElementById('requestsList');
            if (data.friendRequests.length === 0) requestsDiv.innerHTML = 'So\'rovlar yo\'q';
            else {
                requestsDiv.innerHTML = data.friendRequests.map(req => `
                    <div class="user-item">
                        ${req}
                        <button class="small" onclick="acceptRequest('${req}')"><i class="fas fa-check"></i></button>
                    </div>
                `).join('');
            }
        }

        window.acceptRequest = async (from) => {
            await fetch('/api/accept-request', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ from }) });
            loadSocial();
        };

        document.getElementById('sendRequestBtn').onclick = async () => {
            const to = document.getElementById('friendUsername').value;
            if (!to) return;
            const res = await fetch('/api/friend-request', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ to }) });
            const result = await res.json();
            alert(result.error || 'So\'rov yuborildi!');
            document.getElementById('friendUsername').value = '';
        };

        document.getElementById('blockBtn').onclick = async () => {
            const blockUser = document.getElementById('blockUsername').value;
            if (!blockUser) return;
            const res = await fetch('/api/block', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ blockUser }) });
            const result = await res.json();
            alert(result.error || 'Foydalanuvchi bloklandi');
            document.getElementById('blockUsername').value = '';
        };

        // ---------- Enhanced search with profile click ----------
        document.getElementById('searchBtn').onclick = async () => {
            const query = document.getElementById('searchUser').value.trim();
            if (!query) return;
            const res = await fetch('/api/search?q=' + encodeURIComponent(query));
            const users = await res.json();
            const resultDiv = document.getElementById('searchResult');
            if (users.length === 0) {
                resultDiv.innerHTML = `<i class="fas fa-times-circle" style="color:red;"></i> Topilmadi`;
            } else {
                resultDiv.innerHTML = users.map(u => `
                    <div class="user-item" style="cursor:pointer;" data-username="${u.username}">
                        <i class="fas fa-user-circle"></i> ${u.name || u.username} (@${u.username})
                    </div>
                `).join('');
                document.querySelectorAll('[data-username]').forEach(el => {
                    el.addEventListener('click', () => showUserProfile(el.dataset.username));
                });
            }
        };

        // ---------- Profile viewing (click on any user) ----------
        async function showUserProfile(username) {
            const res = await fetch(`/api/profile/${username}`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('viewUsername').innerText = username;
                document.getElementById('viewName').innerText = data.name || username;
                document.getElementById('viewBio').innerText = data.bio || 'Maʼlumot yo‘q';
                document.getElementById('viewInterests').innerText = (data.interests || []).join(', ') || 'Belgilanmagan';
                document.getElementById('viewProfileModal').style.display = 'flex';
            }
        }

        // ---------- Profile editing ----------
        async function loadMyProfile() {
            const res = await fetch(`/api/profile/${currentUsername}`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('editName').value = data.name || currentUsername;
                document.getElementById('editBio').value = data.bio || '';
                document.getElementById('editInterests').value = (data.interests || []).join(', ');
            }
        }

        async function saveProfile() {
            const name = document.getElementById('editName').value;
            const bio = document.getElementById('editBio').value;
            const interestsStr = document.getElementById('editInterests').value;
            const interests = interestsStr.split(',').map(s => s.trim()).filter(s => s);
            const res = await fetch('/api/profile/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, bio, interests })
            });
            if (res.ok) {
                alert('Profil saqlandi!');
                document.getElementById('profileModal').style.display = 'none';
            } else {
                alert('Xatolik yuz berdi');
            }
        }

        // ---------- Modal controls ----------
        const profileModal = document.getElementById('profileModal');
        const editProfileBtn = document.getElementById('editProfileBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const saveProfileBtn = document.getElementById('saveProfileBtn');
        editProfileBtn.onclick = () => { loadMyProfile(); profileModal.style.display = 'flex'; };
        closeModalBtn.onclick = () => profileModal.style.display = 'none';
        saveProfileBtn.onclick = saveProfile;

        const viewModal = document.getElementById('viewProfileModal');
        const closeViewBtn = document.getElementById('closeViewModal');
        closeViewBtn.onclick = () => viewModal.style.display = 'none';
        window.onclick = (e) => {
            if (e.target === profileModal) profileModal.style.display = 'none';
            if (e.target === viewModal) viewModal.style.display = 'none';
        };

        // ---------- Initialisation ----------
        async function init() {
            currentUsername = await getCurrentUser();
            if (!currentUsername) {
                window.location.href = '/login';
                return;
            }
            loadSocial();
            setInterval(loadSocial, 5000);
        }
        init();
    </script>
</body>
</html>
