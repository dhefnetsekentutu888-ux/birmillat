<style>
    .profile-shell {
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1.5rem;
    }
    .profile-card {
        overflow: hidden;
        padding: 0;
        margin-bottom: 1.5rem;
    }
    .cover-band {
        height: 120px;
        background: linear-gradient(120deg, var(--color-primary), #6B4FC9);
    }
    .profile-main {
        padding: 0 2rem 2rem;
        position: relative;
    }
    .avatar-ring {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: var(--color-surface);
        border: 4px solid var(--color-surface);
        margin-top: -55px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-card);
    }
    .avatar-circle {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: #EFEAF8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-size: 2.2rem;
        font-weight: 700;
        color: var(--color-primary);
    }
    .profile-top-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        flex-wrap: wrap;
    }
    .profile-name h1 {
        font-size: 1.5rem;
        margin-top: 0.8rem;
        margin-bottom: 0.15rem;
    }
    .profile-name .username {
        color: var(--color-text-muted);
        font-size: 0.95rem;
        margin-bottom: 1rem;
    }
    .profile-bio {
        font-size: 0.98rem;
        color: var(--color-text);
        max-width: 540px;
        margin-bottom: 1.4rem;
    }
    .profile-bio.empty {
        color: var(--color-text-muted);
        font-style: italic;
    }
    .profile-interests .section-label { margin-top: 0; }

    /* Edit mode */
    .edit-field { margin-bottom: 1.1rem; }
    .edit-field label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--color-text-muted);
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }
    .edit-field input[type=text],
    .edit-field textarea {
        width: 100%;
        padding: 0.7rem 0.9rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--color-border);
        font-family: var(--font-body);
        font-size: 0.95rem;
        resize: vertical;
    }
    .edit-field input:focus,
    .edit-field textarea:focus {
        outline: 2px solid var(--color-accent);
        outline-offset: 1px;
    }
    .interest-input-row {
        display: flex;
        gap: 0.6rem;
    }
    .interest-input-row input { flex: 1; }
    .btn-add {
        background: var(--color-primary);
        color: white;
        border: none;
        padding: 0 1.2rem;
        border-radius: var(--radius-sm);
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
    }
    .btn-add:hover { background: var(--color-primary-light); }
    .editable-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0.8rem 0;
    }
    .editable-tags .tag {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
    }
    .editable-tags .tag button {
        background: none;
        border: none;
        color: inherit;
        cursor: pointer;
        font-size: 0.85rem;
        opacity: 0.6;
        line-height: 1;
        padding: 0;
    }
    .editable-tags .tag button:hover { opacity: 1; }
    .action-row {
        display: flex;
        gap: 0.8rem;
        margin-top: 1.2rem;
    }
    .btn-cancel {
        background: transparent;
        border: 1.5px solid var(--color-border);
        color: var(--color-text-muted);
    }
    .btn-cancel:hover { border-color: var(--color-text-muted); color: var(--color-text); }
    .save-status {
        font-size: 0.85rem;
        margin-top: 0.6rem;
        min-height: 1.2em;
    }
    .save-status.success { color: var(--color-success); }
    .save-status.error { color: var(--color-error); }

    [data-mode="edit"] .view-only { display: none; }
    [data-mode="view"] .edit-only { display: none; }

    .achievements-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 0.8rem;
    }
    .ach-card {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        background: var(--color-surface);
    }
    .ach-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .ach-card img { width: 100%; height: 90px; object-fit: cover; display: block; }
    .ach-card .ach-title {
        padding: 0.5rem 0.6rem;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--color-text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .ach-empty { color: var(--color-text-muted); font-size: 0.85rem; }
    .ach-delete {
        position: absolute; top: 0.4rem; right: 0.4rem;
        background: rgba(26,22,37,0.6); color: white; border: none;
        width: 22px; height: 22px; border-radius: 50%; font-size: 0.7rem;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .ach-card-wrap { position: relative; }

    .ach-modal {
        display: none;
        position: fixed; inset: 0; background: rgba(26,22,37,0.55);
        z-index: 200; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .ach-modal.open { display: flex; }
    .ach-modal-card {
        background: var(--color-surface); border-radius: var(--radius-md);
        max-width: 420px; width: 100%; overflow: hidden; max-height: 90vh; overflow-y: auto;
    }
    .ach-modal-card img { width: 100%; max-height: 260px; object-fit: cover; display: block; }
    .ach-modal-body { padding: 1.4rem; }
    .ach-modal-body h3 { font-size: 1.1rem; margin-bottom: 0.4rem; }
    .ach-modal-body .ach-date { font-size: 0.78rem; color: var(--color-text-muted); margin-bottom: 0.6rem; }
    .ach-modal-body p { font-size: 0.92rem; color: var(--color-text); line-height: 1.5; }
    .ach-modal-close {
        background: transparent; border: 1.5px solid var(--color-border); color: var(--color-text-muted);
        padding: 0.5rem 1rem; border-radius: var(--radius-pill); cursor: pointer; margin-top: 1rem; font-size: 0.85rem;
    }
</style>

    <div class="profile-shell" id="profileRoot" data-mode="view">
        <div class="profile-card card">
            <div class="cover-band"></div>
            <div class="profile-main">
                <div class="profile-top-row">
                    <div class="avatar-ring">
                        <img id="avatarPhoto" class="avatar-circle" style="display:none; object-fit:cover;" alt="">
                        <div class="avatar-circle" id="avatarInitial">?</div>
                    </div>
                    <button class="btn btn-primary view-only" id="editBtn">
                        <i class="fas fa-pen"></i> Profilni tahrirlash

                </div>

                <div class="edit-only" style="margin-bottom:1rem;">
                    <input type="file" id="photoInput" accept="image/*" style="display:none;">
                    <button type="button" class="btn btn-cancel" id="changePhotoBtn" style="border:1.5px solid var(--color-border); background:transparent; color:var(--color-text-muted); font-size:0.85rem; padding:0.5rem 1rem;">
                        <i class="fas fa-camera"></i> Rasmni o'zgartirish
                    </button>
                    <span id="photoStatus" style="font-size:0.82rem; margin-left:0.6rem; color:var(--color-text-muted);"></span>
                </div>

                <!-- VIEW MODE -->
                <div class="view-only">
                    <div class="profile-name">
                        <h1 id="viewName">...</h1>
                        <div class="username" id="viewUsername">@...</div>
                    </div>
                    <p class="profile-bio" id="viewBio"></p>
                    <div class="meta-row" id="viewMeta" style="display:flex; gap:1rem; color:var(--color-text-muted); font-size:0.88rem; margin-bottom:1rem;"></div>

                    <div class="profile-interests">
                        <div class="section-label">Qiziqishlar</div>

                    <div class="profile-achievements" style="margin-top:1.6rem;">

                <!-- EDIT MODE -->
                <div class="edit-only">
                    <div class="edit-field">
                        <label for="nameInput">Ism / Familiya</label>
                        <input type="text" id="nameInput" placeholder="Ismingiz">
                    </div>
                    <div class="edit-field">

        <div class="card" style="padding: 1.6rem; margin-top: 1.5rem;">
            <div class="section-label"><i class="fab fa-telegram"></i> Telegram bildirishnomalari</div>
            <p id="telegramStatusText" style="font-size: 0.9rem; color: var(--color-text-muted); margin: 0.5rem 0 1rem;">Tekshirilmoqda...</p>

    <footer>BirMillat – qiziqishlar asosida do'stlar toping. · <a href="/privacy" style="color:inherit;">Maxfiylik siyosati</a><br><span style="opacity:0.8;">Founder — Bekhruz Ravshanov</span></footer>

    <script>
        const root = document.getElementById('profileRoot');
        let currentInterests = [];
        let editInterests = [];
        let me = null;

        function initials(name) {
            if (!name) return '?';
            const parts = name.trim().split(/\s+/);
            return parts.length > 1
                ? (parts[0][0] + parts[1][0]).toUpperCase()
                : parts[0].slice(0, 2).toUpperCase();
        }

        function renderViewInterests(tags) {
            const el = document.getElementById('viewInterests');
            if (!tags || tags.length === 0) {
                el.innerHTML = `<span class="tag" style="opacity:0.7">Hali qiziqish qo'shilmagan</span>`;
                return;
            }
            el.innerHTML = tags.map(t => `<span class="tag">#${t}</span>`).join('');
        }

        function renderEditInterests() {
            const el = document.getElementById('editInterests');
            if (editInterests.length === 0) {
                el.innerHTML = `<span style="color:var(--color-text-muted); font-size:0.85rem;">Hali qiziqishlar qo'shilmagan</span>`;
                return;
            }
            el.innerHTML = editInterests.map((t, i) =>
                `<span class="tag">#${t} <button data-index="${i}" aria-label="O'chirish">✕</button></span>`
            ).join('');
        }

        const UZ_REGIONS = [
            'Toshkent shahri', 'Toshkent viloyati', 'Andijon', 'Buxoro', "Farg'ona",
            'Jizzax', 'Xorazm', 'Namangan', 'Navoiy', 'Qashqadaryo', 'Samarqand',
            'Sirdaryo', 'Surxondaryo', "Qoraqalpog'iston"
        ];

        function populateRegionDropdown() {
            const select = document.getElementById('regionInput');
            UZ_REGIONS.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                select.appendChild(opt);
            });
        }

        function renderAvatar(photoUrl, name, username) {
            const img = document.getElementById('avatarPhoto');
            const initialsEl = document.getElementById('avatarInitial');
            if (photoUrl) {
                img.src = photoUrl;
                img.style.display = 'block';
                initialsEl.style.display = 'none';
            } else {
                img.style.display = 'none';
                initialsEl.style.display = 'flex';
                initialsEl.textContent = initials(name || username);
            }
        }

        async function loadMe() {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) { window.location.href = '/login'; return; }
                me = await res.json();

                document.getElementById('userBadge').innerHTML = '<img src="/icons/icon-user.svg" alt="" style="width:12px; height:12px; vertical-align:-1px;"> ' + me.username;
                renderAvatar(me.photoUrl, me.name, me.username);
                document.getElementById('viewName').textContent = me.name || me.username;
                document.getElementById('viewUsername').textContent = '@' + me.username;

                const bioEl = document.getElementById('viewBio');
                if (me.bio && me.bio.trim()) {
                    bioEl.textContent = me.bio;
                    bioEl.classList.remove('empty');
                } else {
                    bioEl.textContent = "Hali bio qo'shilmagan.";
                    bioEl.classList.add('empty');
                }

                const metaEl = document.getElementById('viewMeta');
                const metaParts = [];
                if (me.age) metaParts.push(`<span><i class="fas fa-cake-candles"></i> ${me.age} yosh</span>`);
                if (me.region) metaParts.push(`<span><i class="fas fa-location-dot"></i> ${me.region}</span>`);
                metaEl.innerHTML = metaParts.join('');

                currentInterests = me.interests || [];
                renderViewInterests(currentInterests);

                const tgStatus = document.getElementById('telegramStatusText');
                const tgBtn = document.getElementById('telegramLinkBtn');
                if (me.telegramLinked) {
                    tgStatus.innerHTML = '<i class="fas fa-circle-check" style="color:var(--color-success);"></i> Ulangan — like, xabar va tadbir bildirishnomalarini Telegram orqali olasiz.';
                    tgBtn.style.display = 'none';
                } else {
                    tgStatus.textContent = "Ulanmagan. Ulasangiz, maqolangiz yoqtirilganda, yangi xabar kelganda yoki tadbiringizga birov qo'shilganda Telegram orqali xabar olasiz.";
                    tgBtn.style.display = 'inline-flex';
                }

                document.getElementById('nameInput').value = me.name || '';
                document.getElementById('bioInput').value = me.bio || '';
                document.getElementById('birthdateInput').value = me.birthdate ? me.birthdate.split('T')[0] : '';
                document.getElementById('regionInput').value = me.region || '';
                editInterests = [...currentInterests];
                renderEditInterests();
            } catch (e) {
                console.error('Failed to load profile:', e);
            }
        }

        document.getElementById('editBtn').addEventListener('click', () => {
            editInterests = [...currentInterests];
            renderEditInterests();
            document.getElementById('nameInput').value = me.name || '';
            document.getElementById('bioInput').value = me.bio || '';
            document.getElementById('saveStatus').textContent = '';
            root.setAttribute('data-mode', 'edit');
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            root.setAttribute('data-mode', 'view');
        });

        document.getElementById('addInterestBtn').addEventListener('click', addInterest);
        document.getElementById('newInterestInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); addInterest(); }
        });

        function addInterest() {
            const input = document.getElementById('newInterestInput');
            const val = input.value.trim();
            if (!val) return;
            if (editInterests.some(i => i.toLowerCase() === val.toLowerCase())) {
                input.value = '';
                return;
            }
            editInterests.push(val);
            input.value = '';
            renderEditInterests();
        }

        document.getElementById('editInterests').addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-index]');
            if (!btn) return;
            const idx = parseInt(btn.getAttribute('data-index'), 10);
            editInterests.splice(idx, 1);
            renderEditInterests();
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const statusEl = document.getElementById('saveStatus');
            const name = document.getElementById('nameInput').value.trim();
            const bio = document.getElementById('bioInput').value.trim();
            const birthdate = document.getElementById('birthdateInput').value;
            const region = document.getElementById('regionInput').value;

            statusEl.textContent = 'Saqlanmoqda...';
            statusEl.className = 'save-status';

            try {
                const res = await fetch('/api/profile/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, bio, interests: editInterests, birthdate, region })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || 'Server error');

                statusEl.textContent = 'Saqlandi ✓';
                statusEl.className = 'save-status success';
                await loadMe();
                setTimeout(() => { root.setAttribute('data-mode', 'view'); }, 500);
            } catch (e) {
                console.error('Save failed:', e);
                statusEl.textContent = e.message && e.message !== 'Server error' ? e.message : "Saqlashda xatolik yuz berdi. Qaytadan urinib ko'ring.";
                statusEl.className = 'save-status error';
            }
        });

        document.getElementById('changePhotoBtn').addEventListener('click', () => {
            document.getElementById('photoInput').click();
        });

        document.getElementById('photoInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const statusEl = document.getElementById('photoStatus');

            statusEl.textContent = 'Yuklanmoqda...';
            try {
                const formData = new FormData();
                formData.append('photo', file);
                const res = await fetch('/api/profile/photo', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server error');

                renderAvatar(data.photoUrl, me.name, me.username);
                statusEl.textContent = 'Yangilandi ✓';
                setTimeout(() => { statusEl.textContent = ''; }, 2000);
            } catch (err) {
                console.error('Photo upload failed:', err);
                statusEl.textContent = err.message || "Xatolik yuz berdi";
            }
        });

        // ---------- Achievements ----------
        let myAchievements = [];

        function renderAchievementCard(ach, editable) {
            const wrap = document.createElement('div');
            wrap.className = 'ach-card-wrap';
            wrap.innerHTML = `
                <div class="ach-card" data-id="${ach.id}">
                    <img src="${ach.imageUrl}" alt="">
                    <div class="ach-title">${ach.title}</div>
                </div>
                ${editable ? `<button class="ach-delete" data-id="${ach.id}" aria-label="O'chirish">✕</button>` : ''}
            `;
            return wrap;
        }

        function openAchievementModal(ach) {
            document.getElementById('achModalImage').src = ach.imageUrl;
            document.getElementById('achModalTitle').textContent = ach.title;
            document.getElementById('achModalDate').textContent = ach.achievedDate
                ? formatUzDate(ach.achievedDate)
                : '';
            document.getElementById('achModalDesc').textContent = ach.description || '';
            document.getElementById('achModal').classList.add('open');
        }

        document.getElementById('achModalClose').addEventListener('click', () => {
            document.getElementById('achModal').classList.remove('open');
        });
        document.getElementById('achModal').addEventListener('click', (e) => {
            if (e.target.id === 'achModal') document.getElementById('achModal').classList.remove('open');
        });

        async function loadAchievements() {
            try {
                const res = await fetch(`/api/users/${encodeURIComponent(me.username)}/achievements`);
                if (!res.ok) return;
                myAchievements = await res.json();

                const viewGrid = document.getElementById('achievementsGrid');
                const editGrid = document.getElementById('editAchievementsGrid');

                if (myAchievements.length === 0) {
                    viewGrid.innerHTML = `<span class="ach-empty">Hali yutuqlar qo'shilmagan</span>`;
                } else {
                    viewGrid.innerHTML = '';
                    myAchievements.forEach(ach => {
                        const card = renderAchievementCard(ach, false);
                        card.querySelector('.ach-card').addEventListener('click', () => openAchievementModal(ach));
                        viewGrid.appendChild(card);
                    });
                }

                editGrid.innerHTML = '';
                myAchievements.forEach(ach => {
                    const card = renderAchievementCard(ach, true);
                    card.querySelector('.ach-card').addEventListener('click', () => openAchievementModal(ach));
                    editGrid.appendChild(card);
                });

                document.getElementById('achievementFormWrap').style.display =
                    myAchievements.length >= 4 ? 'none' : 'block';
            } catch (e) {
                console.error('Failed to load achievements:', e);
            }
        }

        document.getElementById('editAchievementsGrid').addEventListener('click', async (e) => {
            const delBtn = e.target.closest('.ach-delete');
            if (!delBtn) return;
            const id = delBtn.getAttribute('data-id');
            if (!confirm("Bu yutuqni o'chirmoqchimisiz?")) return;
            try {
                const res = await fetch(`/api/achievements/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Server error');
                await loadAchievements();
            } catch (err) {
                console.error('Delete achievement failed:', err);
                alert("O'chirishda xatolik yuz berdi.");
            }
        });

        document.getElementById('addAchievementBtn').addEventListener('click', async () => {
            const statusEl = document.getElementById('achStatus');
            const title = document.getElementById('achTitleInput').value.trim();
            const description = document.getElementById('achDescInput').value.trim();
            const achievedDate = document.getElementById('achDateInput').value;
            const fileInput = document.getElementById('achImageInput');

            if (!title || !fileInput.files[0]) {
                statusEl.textContent = "Sarlavha va rasm kerak";
                statusEl.style.color = 'var(--color-error)';
                return;
            }

            statusEl.textContent = 'Yuklanmoqda...';
            statusEl.style.color = 'var(--color-text-muted)';

            try {
                const formData = new FormData();
                formData.append('title', title);
                formData.append('description', description);
                formData.append('achievedDate', achievedDate);
                formData.append('image', fileInput.files[0]);

                const res = await fetch('/api/achievements', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server error');

                statusEl.textContent = "Qo'shildi ✓";
                statusEl.style.color = 'var(--color-success)';
                document.getElementById('achTitleInput').value = '';
                document.getElementById('achDescInput').value = '';
                document.getElementById('achDateInput').value = '';
                fileInput.value = '';
                await loadAchievements();
                setTimeout(() => { statusEl.textContent = ''; }, 2000);
            } catch (err) {
                console.error('Add achievement failed:', err);
                statusEl.textContent = err.message || "Xatolik yuz berdi";
                statusEl.style.color = 'var(--color-error)';
            }
        });

        populateRegionDropdown();
        document.getElementById('telegramLinkBtn').addEventListener('click', async () => {
            const btn = document.getElementById('telegramLinkBtn');
            btn.disabled = true;
            try {
                const res = await fetch('/api/telegram/link-token', { method: 'POST' });
                if (!res.ok) throw new Error();
                const data = await res.json();
                window.open(data.deepLink, '_blank');
            } catch (e) {
                alert("Xatolik yuz berdi. Qaytadan urinib ko'ring.");
            } finally {
                btn.disabled = false;
            }
        });

        loadMe().then(() => loadAchievements());
    </script>
</body>
</html>
