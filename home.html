<!DOCTYPE html>
<html>
<head>
    <title>BirMillat – Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f4f6f9;
        }
        .btn {
            background: #c0392b;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 20px;
        }
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>BirMillat</h1>
    <p>Xush kelibsiz, <span id="username">yuklanmoqda...</span></p>
    <button class="btn" id="chatButton">Suhbatga o‘tish →</button>
    <br>
    <a href="#" id="sidebarChatLink" class="btn" style="background: #2c7da0;">Global suhbat (sidebar)</a>

    <script>
        // Get username from API
        fetch('/api/me')
            .then(res => res.json())
            .then(data => {
                document.getElementById('username').innerText = data.username;
            })
            .catch(() => {
                document.getElementById('username').innerText = "foydalanuvchi";
            });

        // Button 1: direct navigation
        document.getElementById('chatButton').onclick = function() {
            window.location.href = '/chat';
        };

        // Button 2: sidebar link – prevent default and navigate
        const sidebarLink = document.getElementById('sidebarChatLink');
        sidebarLink.onclick = function(e) {
            e.preventDefault();
            window.location.href = '/chat';
        };
    </script>
</body>
</html>
