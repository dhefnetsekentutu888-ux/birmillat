<!DOCTYPE html>
<html>
<head>
    <title>BirMillat – Tavsiyalar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f4f6f9;display:flex;min-height:100vh}
        .sidebar{
            width:260px;
            background:white;
            border-right:1px solid #e0e0e0;
            position:fixed;
            height:100vh;
            overflow:auto;
        }
        .sidebar-header{padding:20px;font-size:20px;font-weight:bold;border-bottom:1px solid #e0e0e0;color:#c0392b}
        .sidebar-menu{padding:15px 0}
        .menu-item{display:flex;align-items:center;gap:15px;padding:12px 20px;color:#333;text-decoration:none}
        .menu-item:hover{background:#f0f2f5}
        .menu-item.active{background:#fce4e1;color:#c0392b;border-left:4px solid #c0392b}
        .main-content{margin-left:260px;flex:1;padding:20px}
        .welcome-card{background:white;border-radius:20px;padding:30px;margin-bottom:20px}
        .user-greeting{font-size:28px;margin-bottom:10px}
        .recommendations h2{margin:20px 0}
        .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .user-card{background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
        .user-card h3{margin-bottom:5px}
        .user-card p{color:#666;margin:8px 0}
        .interests{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
        .interest-tag{background:#ecf5f9;color:#2c7da0;padding:4px 10px;border-radius:20px;font-size:12px}
        .btn-follow{background:#c0392b;color:white;border:none;padding:8px 16px;border-radius:30px;cursor:pointer}
        .btn-profile{background:#2c7da0;color:white;border:none;padding:8px 16px;border-radius:30px;cursor:pointer;margin-right:10px}
        @media (max-width:768px){.sidebar{width:70px}.sidebar-header span{display:none}.main-content{margin-left:70px}}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">BirMillat</div>
        <div class="sidebar-menu">
            <a href="/home" class="menu-item active"><i class="fas fa-home"></i> <span>Bosh sahifa</span></a>
            <a href="/profile" class="menu-item"><i class="fas fa-user-edit"></i> <span>Profilim</span></a>
            <a href="/logout" class="menu-item"><i class="fas fa-sign-out-alt"></i> <span>Chiqish</span></a>
        </div>
    </div>
    <div class="main-content">
        <div class="welcome-card">
            <div class="user-greeting"><i class="fas fa-smile-wink"></i> Xush kelibsiz, <span id="username"></span>!</div>
            <p>Qiziqishlaringizga mos foydalanuvchilar quyida tavsiya etiladi.</p>
        </div>
        <div class="recommendations">
            <h2><i class="fas fa-users"></i> Sizga tavsiya etiladi</h2>
            <div id="recommendationsGrid" class="users-grid">Yuklanmoqda...</div>
        </div>
    </div>
    <script>
        async function loadUserAndRecommendations() {
            try {
                const meRes = await fetch('/api/me');
                if (!meRes.ok) throw new Error();
                const me = await meRes.json();
                document.getElementById('username').innerText = me.name || me.username;

                const recRes = await fetch('/api/recommendations');
                const users = await recRes.json();
                const grid = document.getElementById('recommendationsGrid');
                if (users.length === 0) {
                    grid.innerHTML = '<p>Hozircha tavsiyalar yo‘q. Profilingizga qiziqishlar qo‘shib ko‘ring.</p>';
                    return;
                }
                grid.innerHTML = users.map(u => `
                    <div class="user-card">
                        <h3>${u.name || u.username}</h3>
                        <p>@${u.username}</p>
                        <div class="interests">
                            ${(u.interests || []).slice(0,5).map(i => `<span class="interest-tag">#${i}</span>`).join('')}
                            ${(u.interests || []).length > 5 ? `<span class="interest-tag">+${u.interests.length-5}</span>` : ''}
                        </div>
                        <p><small>Moslik: ${u.matchScore} ta umumiy qiziqish</small></p>
                        <button class="btn-follow" data-username="${u.username}">Kuzatish</button>
                    </div>
                `).join('');
                document.querySelectorAll('.btn-follow').forEach(btn => {
                    btn.onclick = () => alert(`Siz ${btn.dataset.username} ga kuzatuv so‘rov yubordingiz. (Bu funksiya keyingi versiyada)`);
                });
            } catch(e) {
                window.location.href = '/login';
            }
        }
        loadUserAndRecommendations();
    </script>
</body>
</html>
