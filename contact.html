<!DOCTYPE html>
<html lang="uz">
<head>
<script src="/theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BirMillat – Aloqa</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/style.css">
<style>
    .contact-shell {
        max-width: 560px;
        margin: 3rem auto;
        padding: 0 1.5rem;
    }
    .contact-card { padding: 2.2rem; }
    .contact-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .contact-card > p { color: var(--color-text-muted); margin-bottom: 1.8rem; }
    .form-field { margin-bottom: 1.1rem; }
    .form-field label {
        display: block; font-size: 0.82rem; font-weight: 600;
        color: var(--color-text-muted); margin-bottom: 0.4rem;
        text-transform: uppercase; letter-spacing: 0.4px;
    }
    .form-field input, .form-field textarea {
        width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius-sm);
        border: 1px solid var(--color-border); font-family: var(--font-body);
        font-size: 0.95rem; resize: vertical;
    }
    .form-field input:focus, .form-field textarea:focus {
        outline: 2px solid var(--color-accent); outline-offset: 1px;
    }
    .submit-status { font-size: 0.88rem; margin-top: 0.8rem; min-height: 1.2em; }
    .submit-status.success { color: var(--color-success); }
    .submit-status.error { color: var(--color-error); }
</style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo"><svg width="160" height="45" viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg" style="display:block;">
      <g transform="translate(45,45)">
        <g transform="rotate(-18)">
          <ellipse cx="-10" cy="0" rx="20" ry="36" fill="none" stroke="#2D1B69" stroke-width="10"/>
        </g>
        <g transform="rotate(18)">
          <ellipse cx="10" cy="0" rx="20" ry="36" fill="none" stroke="#FF6B5B" stroke-width="10"/>
        </g>
        <g transform="rotate(-18)">
          <path d="M -30 0 A 20 36 0 0 1 11 0" fill="none" stroke="#2D1B69" stroke-width="10" stroke-linecap="round"/>
        </g>
      </g>
      <text x="95" y="53" font-size="34" font-weight="700" fill="#2D1B69" font-family="Poppins, -apple-system, sans-serif">Bir<tspan fill="#FF6B5B">Millat</tspan></text>
    </svg></a>
        <button class="nav-toggle" id="navToggle" aria-label="Menyu"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="/login">Kirish</a>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Mavzuni almashtirish"><i class="fas fa-moon"></i></button>
</nav>

    <div class="contact-shell">
        <div class="contact-card card">
            <h1><i class="fas fa-envelope"></i> Biz bilan bog'lanish</h1>
            <p>Reklama, hamkorlik yoki boshqa savollar bo'yicha murojaat qiling — xabaringiz to'g'ridan-to'g'ri jamoamizga yetib boradi.</p>

            <form id="contactForm">
                <div class="form-field">
                    <label for="nameInput">Ismingiz</label>
                    <input type="text" id="nameInput" placeholder="Ismingiz (ixtiyoriy)">
                </div>
                <div class="form-field">
                    <label for="contactInput">Aloqa uchun (telefon, Telegram, email)</label>
                    <input type="text" id="contactInput" placeholder="@username yoki +998...">
                </div>
                <div class="form-field">
                    <label for="messageInput">Xabar</label>
                    <textarea id="messageInput" rows="5" placeholder="Xabaringizni shu yerga yozing..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
                    <i class="fas fa-paper-plane"></i> Yuborish
                </button>
                <div class="submit-status" id="submitStatus"></div>
            </form>
        </div>
    </div>

    <footer>BirMillat – qiziqishlar asosida do'stlar toping. · <a href="/privacy" style="color:inherit;">Maxfiylik siyosati</a><br><span style="opacity:0.8;">Founder — Bekhruz Ravshanov</span></footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('submitStatus');
            const message = document.getElementById('messageInput').value.trim();

            if (!message) return;

            statusEl.textContent = 'Yuborilmoqda...';
            statusEl.className = 'submit-status';

            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('nameInput').value.trim(),
                        contact: document.getElementById('contactInput').value.trim(),
                        message
                    })
                });
                if (!res.ok) throw new Error('Server error');

                statusEl.textContent = "Xabaringiz yuborildi! Tez orada javob beramiz.";
                statusEl.className = 'submit-status success';
                document.getElementById('contactForm').reset();
            } catch (err) {
                console.error('Contact submit failed:', err);
                statusEl.textContent = "Xatolik yuz berdi. Qaytadan urinib ko'ring.";
                statusEl.className = 'submit-status error';
            }
        });
    </script>

    <script>
        const navToggleBtn = document.getElementById('navToggle');
        const navLinksEl = document.getElementById('navLinks');
        if (navToggleBtn && navLinksEl) {
            navToggleBtn.addEventListener('click', () => {
                navLinksEl.classList.toggle('open');
            });
        }
    </script>
</body>
</html>
