<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirMillat – Do'stlaringizni qiziqishlar asosida toping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1e2a3e;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        h1, h2, h3 {
            margin-bottom: 12px;
        }
        input, button {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #cbd5e0;
            font-size: 14px;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background: #1f5e7a;
        }
        .interest-tag {
            background: #ecf5f9;
            color: #2c7da0;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 13px;
            display: inline-block;
            margin: 4px 6px 4px 0;
        }
        .user-card {
            background: #f9fbfd;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }
        .follow-btn {
            background: transparent;
            color: #2c7da0;
            border: 1px solid #2c7da0;
            padding: 4px 12px;
            font-size: 12px;
        }
        .follow-btn:hover {
            background: #2c7da0;
            color: white;
        }
        .logout-btn {
            background: #cbd5e0;
            color: #2d3748;
        }
        .logout-btn:hover {
            background: #a0aec0;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: white;
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c7da0;
        }
        .user-badge {
            background: #edf2f7;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
        }
        @media (max-width: 640px) {
            .navbar { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">BirMillat</div>
        <div style="display: flex; gap: 20px;">
            <a href="#" style="text-decoration: none; color: #2c7da0; font-weight: 500;">Bosh sahifa</a>
            <a href="#" style="text-decoration: none; color: #2c3e50;">Global suhbat</a>
            <a href="#" style="text-decoration: none; color: #2c3e50;">Profil</a>
        </div>
        <div class="user-badge" id="userBadge"></div>
    </div>

    <div id="app"></div>
</div>

<script>
    // ==================== localStorage user system ====================
    let currentUser = localStorage.getItem('birMillat_user');
    let users = JSON.parse(localStorage.getItem('birMillat_users')) || {};

    // Pre-populate with some example users if empty
    if (Object.keys(users).length === 0) {
        users = {
            "Behruzbek2010": { password: "123", name: "Behruzbek2010", interests: ["🐍 Python", "🤖 Sun’iy intellekt", "🎮 O‘yinlar", "☁️ Cloud computing", "📱 Mobil dasturlash"], friends: [] },
            "SabinaR": { password: "123", name: "SabinaR", interests: ["🤖 Sun’iy intellekt", "🐍 Python", "📊 Data Science"], friends: [] },
            "JasurDev": { password: "123", name: "JasurDev", interests: ["🐍 Python", "📱 Mobil dasturlash", "⚙️ Flutter"], friends: [] },
            "DilnozaCloud": { password: "123", name: "DilnozaCloud", interests: ["☁️ Cloud computing", "🐍 Python", "🔧 DevOps"], friends: [] },
            "BehzodGamer": { password: "123", name: "BehzodGamer", interests: ["🎮 O‘yinlar", "🕹️ Unity", "🐍 Python"], friends: [] },
            "MadinaML": { password: "123", name: "MadinaML", interests: ["🤖 Sun’iy intellekt", "📈 Machine Learning", "🎮 O‘yinlar"], friends: [] }
        };
        localStorage.setItem('birMillat_users', JSON.stringify(users));
    }

    function saveUsers() {
        localStorage.setItem('birMillat_users', JSON.stringify(users));
    }

    function setCurrentUser(username) {
        currentUser = username;
        localStorage.setItem('birMillat_user', username);
        renderApp();
    }

    function updateUserBadge() {
        const badge = document.getElementById('userBadge');
        if (currentUser) {
            badge.innerHTML = `👤 ${currentUser}`;
        } else {
            badge.innerHTML = `🚪 Chiqmagan`;
        }
    }

    // Compute match score based on common interests
    function getMatchScore(userInterests, myInterests) {
        let matches = userInterests.filter(i => myInterests.some(my => my === i));
        return matches.length;
    }

    // Render the main app
    function renderApp() {
        const app = document.getElementById('app');
        updateUserBadge();

        if (!currentUser) {
            // Login / Register screen
            app.innerHTML = `
                <div class="card">
                    <h2>🔐 Kirish yoki Ro‘yxatdan o‘tish</h2>
                    <input type="text" id="loginName" placeholder="Foydalanuvchi nomi" />
                    <input type="password" id="loginPass" placeholder="Parol" />
                    <button id="loginBtn">Kirish</button>
                    <button id="registerBtn">Ro‘yxatdan o‘tish</button>
                </div>
            `;
            document.getElementById('loginBtn').onclick = () => {
                let name = document.getElementById('loginName').value.trim();
                let pass = document.getElementById('loginPass').value;
                if (name && users[name] && users[name].password === pass) {
                    setCurrentUser(name);
                } else {
                    alert("Foydalanuvchi nomi yoki parol noto‘g‘ri");
                }
            };
            document.getElementById('registerBtn').onclick = () => {
                let name = document.getElementById('loginName').value.trim();
                let pass = document.getElementById('loginPass').value;
                if (name && !users[name]) {
                    users[name] = { password: pass, name: name, interests: [], friends: [] };
                    saveUsers();
                    setCurrentUser(name);
                } else {
                    alert("Bu nom band yoki bo‘sh");
                }
            };
            return;
        }

        // Logged in – show profile and recommendations
        const me = users[currentUser];
        if (!me) {
            // fallback
            currentUser = null;
            localStorage.removeItem('birMillat_user');
            renderApp();
            return;
        }

        const myInterests = me.interests || [];
        const otherUsers = Object.keys(users).filter(u => u !== currentUser);

        // Calculate scores and sort
        const scored = otherUsers.map(u => {
            const userInterests = users[u].interests || [];
            const matchCount = getMatchScore(userInterests, myInterests);
            return { name: u, interests: userInterests, matchCount };
        });
        scored.sort((a,b) => b.matchCount - a.matchCount);

        let recommendationsHtml = '';
        if (scored.length === 0) {
            recommendationsHtml = '<p>Hozircha boshqa foydalanuvchilar yo‘q.</p>';
        } else {
            recommendationsHtml = scored.map(u => `
                <div class="user-card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${u.name}</strong>
                            <div style="font-size: 12px; color: #5f7f9c;">
                                ${u.interests.slice(0, 3).map(i => `<span class="interest-tag">${i}</span>`).join('')}
                                ${u.interests.length > 3 ? `<span class="interest-tag">+${u.interests.length-3}</span>` : ''}
                            </div>
                        </div>
                        <button class="follow-btn" data-name="${u.name}">➕ Kuzatish</button>
                    </div>
                </div>
            `).join('');
        }

        app.innerHTML = `
            <div class="card">
                <h2>Xush kelibsiz, ${currentUser}!</h2>
                <div>
                    <strong>Qiziqishlaringiz:</strong>
                    <div id="interestsContainer" style="margin: 10px 0;">
                        ${myInterests.map(i => `<span class="interest-tag">${i}</span>`).join('')}
                        ${myInterests.length === 0 ? '<span style="color: gray;">Hali qiziqishlar qo‘shilmagan</span>' : ''}
                    </div>
                    <div>
                        <input type="text" id="newInterest" placeholder="Yangi qiziqish (masalan: AI)" />
                        <button id="addInterestBtn">➕ Qo‘shish</button>
                    </div>
                </div>
                <button id="logoutBtn" class="logout-btn" style="margin-top: 16px;">🚪 Chiqish</button>
            </div>
            <div class="card">
                <h3>👥 Sizga tavsiya etiladi (qiziqishlar asosida)</h3>
                <div id="recommendationsList">${recommendationsHtml}</div>
            </div>
        `;

        // Add interest
        document.getElementById('addInterestBtn').onclick = () => {
            let newInt = document.getElementById('newInterest').value.trim();
            if (newInt && !me.interests.includes(newInt)) {
                me.interests.push(newInt);
                saveUsers();
                renderApp();
            } else if (newInt && me.interests.includes(newInt)) {
                alert("Bu qiziqish allaqachon mavjud");
            }
        };

        // Logout
        document.getElementById('logoutBtn').onclick = () => {
            currentUser = null;
            localStorage.removeItem('birMillat_user');
            renderApp();
        };

        // Follow buttons
        document.querySelectorAll('.follow-btn').forEach(btn => {
            btn.onclick = (e) => {
                const targetName = btn.getAttribute('data-name');
                alert(`Siz ${targetName} ga kuzatuv so‘rov yubordingiz. (Bu funksiya keyingi versiyada to‘liq ishlaydi)`);
                btn.textContent = '✓ So‘rov yuborildi';
                btn.disabled = true;
            };
        });
    }

    renderApp();
</script>
</body>
</html>
